<body>
    <header>
        <div>
            <h1>우리동네 안심 PM 지도</h1>
            <a href="#sitemap">사이트맵</a>
            <input type="text" placeholder="검색바">
        </div>
        <nav>
            <ul>
                <li><a href="#">신고 접수</a></li>
                <li><a href="#">접수건 조회</a></li>

    <main>
        <section>
            <h2>불법주차 신고 접수하기</h2>
            <form>
                <fieldset>
                <legend>신고 제목 및 작성자 정보</legend>
                <label for="title">신고 제목: </label>
                <input type="text" id="title" name="title"><br><br>
                
                <label for="writer">작성자: </label>
                <input type="text" id="writer" name="writer">
            </fieldset>
            </form>
        </section>
        <br>
        <section>
            <form>
                <fieldset>
                <legend>신고 내용 및 사진 작성</legend>
                <label for="content">신고 내용:</label><br>
                <textarea id="content" name="content" rows="10" cols="50" placeholder="신고내용을 입력해주세요."></textarea>
                <br><br>
                <label for="file">사진 첨부 : </label>
                <input type="file" id="file" name="file">
                <button type="submit">제출하기</button>
            </fieldset>
            </form>
        </section>
    </main>

    <footer>
